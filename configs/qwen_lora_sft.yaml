model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct

# Data
train_file: data/processed/train.jsonl
valid_file: data/processed/valid.jsonl
cutoff_len: 1024
max_samples: null  # null = use all

# Training
output_dir: outputs/qwen-dialogue-rewriter-lora
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 2
fp16: true
seed: 42

# LoRA
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Quantization (set false on machines without bitsandbytes, e.g. Mac)
load_in_4bit: true

# Prompt
system_prompt: |
  Bạn là model rewrite hội thoại. Nhiệm vụ của bạn là biến câu nói cuối của user thành một yêu cầu độc lập, rõ ràng, giữ nguyên ý định, không thêm thông tin không chắc chắn. Chỉ trả về câu rewrite.
